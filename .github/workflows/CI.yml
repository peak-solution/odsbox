name: Build

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Ruff lint
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy
        run: uv run mypy src/

  test:
    name: Unit tests (Python ${{ matrix.python-version }}, pandas ${{
      matrix.pandas-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.13" ]
        pandas-version: [ ">=2,<3", ">=3,<4" ]
        exclude:
          - python-version: "3.10"
            pandas-version: ">=3,<4"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Pin pandas version
        run: uv pip install "pandas${{ matrix.pandas-version }}" --upgrade

      - name: Run unit tests
        run: uv run --no-sync pytest tests/ -v

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Audit for known vulnerabilities
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes --all-groups > requirements-audit.txt
          uv run pip-audit --strict -r requirements-audit.txt

  release:
    name: Release
    needs: [ lint, test, audit ]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Run semantic release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: uv run semantic-release version

      - name: Detect release tag
        id: release_check
        shell: bash
        run: |
          if git tag --points-at HEAD | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build package
        if: steps.release_check.outputs.released == 'true'
        run: uv build

      - name: Publish to PyPI
        if: steps.release_check.outputs.released == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_PASSWORD }}
        run: uv publish
